apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
  namespace: project-modern
  labels:
    app: evaluation-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: evaluation-service
      version: v1
  template:
    metadata:
      labels:
        app: evaluation-service
        version: v1
    spec:
      containers:
        - name: evaluation-service
          image: ghcr.io/projectmodern/evaluation:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: project-modern-config
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: project-modern-secrets
                  key: GITHUB_TOKEN
            - name: LIBRARIES_IO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: project-modern-secrets
                  key: LIBRARIES_IO_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: evaluation-service
  namespace: project-modern
spec:
  selector:
    app: evaluation-service
  ports:
    - port: 80
      targetPort: 3000
      name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: evaluation-service
  namespace: project-modern
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  rules:
    - host: api.projectmodern.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: evaluation-service
                port:
                  number: 80
  tls:
    - hosts:
        - api.projectmodern.io
      secretName: projectmodern-tls
