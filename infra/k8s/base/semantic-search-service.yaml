apiVersion: apps/v1
kind: Deployment
metadata:
  name: semantic-search-service
  namespace: project-modern
  labels:
    app: semantic-search-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: semantic-search-service
      version: v1
  template:
    metadata:
      labels:
        app: semantic-search-service
        version: v1
    spec:
      containers:
        - name: semantic-search-service
          image: ghcr.io/projectmodern/semantic-search:latest
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: project-modern-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: project-modern-secrets
                  key: OPENAI_API_KEY
            - name: DATABASE_URL
              value: "postgresql://projectmodern:$(POSTGRES_PASSWORD)@postgres:5432/projectmodern"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: project-modern-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: semantic-search-service
  namespace: project-modern
spec:
  selector:
    app: semantic-search-service
  ports:
    - port: 80
      targetPort: 3001
      name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: semantic-search-service
  namespace: project-modern
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  rules:
    - host: search.projectmodern.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: semantic-search-service
                port:
                  number: 80
  tls:
    - hosts:
        - search.projectmodern.io
      secretName: projectmodern-tls
