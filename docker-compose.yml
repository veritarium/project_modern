version: '3.8'

services:
  # PostgreSQL with pgvector for semantic search
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: projectmodern
      POSTGRES_PASSWORD: password
      POSTGRES_DB: projectmodern
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projectmodern"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Evaluation Service
  evaluation:
    build:
      context: .
      dockerfile: services/evaluation/Dockerfile
    environment:
      PORT: 3000
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      LIBRARIES_IO_API_KEY: ${LIBRARIES_IO_API_KEY:-}
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Semantic Search Service
  semantic-search:
    build:
      context: .
      dockerfile: services/semantic-search/Dockerfile
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://projectmodern:password@postgres:5432/projectmodern
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
  redis_data:
