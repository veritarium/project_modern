<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Modern - API Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        input, select, button {
            padding: 12px 16px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 16px;
        }
        
        input {
            flex: 1;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        button {
            background: #3b82f6;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #2563eb;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        
        .score-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .score-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            border: 4px solid;
        }
        
        .score-excellent {
            border-color: #22c55e;
            color: #22c55e;
        }
        
        .score-good {
            border-color: #eab308;
            color: #eab308;
        }
        
        .score-poor {
            border-color: #ef4444;
            color: #ef4444;
        }
        
        .score-info h2 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        
        .score-info p {
            color: #94a3b8;
        }
        
        .breakdown {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .metric {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        
        .metric-label {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        
        .metric-value {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .metric-value.high { color: #22c55e; }
        .metric-value.medium { color: #eab308; }
        .metric-value.low { color: #ef4444; }
        
        .recommendation {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #3b82f6;
            margin-top: 20px;
        }
        
        .sources {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #334155;
        }
        
        .source-tag {
            display: inline-block;
            padding: 4px 12px;
            background: #334155;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        
        .source-tag.mock {
            background: #7c3aed;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        
        .error {
            background: #450a0a;
            border: 1px solid #dc2626;
            color: #fecaca;
            padding: 15px;
            border-radius: 8px;
        }
        
        .popular-tools {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }
        
        .tool-chip {
            padding: 8px 16px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tool-chip:hover {
            background: #334155;
            border-color: #3b82f6;
        }
        
        pre {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.9rem;
            margin-top: 20px;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Project Modern</h1>
        <p class="subtitle">API Demo - OpenSSF Scorecard + Libraries.io + GitHub Integration</p>
        
        <div class="search-box">
            <select id="platform">
                <option value="npm">npm</option>
                <option value="pypi">PyPI</option>
                <option value="maven">Maven</option>
                <option value="rubygems">RubyGems</option>
            </select>
            <input type="text" id="packageName" placeholder="Enter package name (e.g., react, lodash, express)" value="react">
            <button onclick="evaluateTool()">Evaluate</button>
        </div>
        
        <div class="popular-tools">
            <span style="color: #94a3b8; margin-right: 10px;">Popular:</span>
            <span class="tool-chip" onclick="selectTool('npm', 'react')">react</span>
            <span class="tool-chip" onclick="selectTool('npm', 'vue')">vue</span>
            <span class="tool-chip" onclick="selectTool('npm', 'svelte')">svelte</span>
            <span class="tool-chip" onclick="selectTool('npm', 'angular')">angular</span>
            <span class="tool-chip" onclick="selectTool('npm', 'lodash')">lodash</span>
            <span class="tool-chip" onclick="selectTool('npm', 'express')">express</span>
            <span class="tool-chip" onclick="selectTool('npm', 'next')">next</span>
            <span class="tool-chip" onclick="selectTool('npm', 'typescript')">typescript</span>
        </div>
        
        <div id="result"></div>
        
        <div id="rawData" class="hidden">
            <h3 style="margin: 20px 0 10px;">Raw API Response</h3>
            <pre id="rawJson"></pre>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000';
        
        function selectTool(platform, name) {
            document.getElementById('platform').value = platform;
            document.getElementById('packageName').value = name;
            evaluateTool();
        }
        
        async function evaluateTool() {
            const platform = document.getElementById('platform').value;
            const name = document.getElementById('packageName').value.trim();
            
            if (!name) return;
            
            const resultDiv = document.getElementById('result');
            const rawDataDiv = document.getElementById('rawData');
            
            resultDiv.innerHTML = '<div class="loading">🔍 Evaluating package...</div>';
            rawDataDiv.classList.add('hidden');
            
            try {
                const response = await fetch(`${API_BASE}/tools/${platform}/${name}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                displayResult(data);
                
                // Show raw data
                document.getElementById('rawJson').textContent = JSON.stringify(data, null, 2);
                rawDataDiv.classList.remove('hidden');
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> ${error.message}<br><br>
                        Make sure the API server is running:<br>
                        <code>cd spikes/scorecard-integration && npm install && npm start</code>
                    </div>
                `;
            }
        }
        
        function displayResult(data) {
            const eval_ = data.evaluation;
            const score = eval_.composite;
            const scoreClass = score >= 8 ? 'excellent' : score >= 6 ? 'good' : 'poor';
            const gradeColor = score >= 8 ? 'high' : score >= 6 ? 'medium' : 'low';
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <div class="result">
                    <div class="score-header">
                        <div class="score-circle score-${scoreClass}">
                            ${score.toFixed(1)}
                        </div>
                        <div class="score-info">
                            <h2>${data.name}</h2>
                            <p>${data.metadata?.description || 'No description available'}</p>
                            <p style="margin-top: 5px;">
                                <span class="source-tag">${data.platform}</span>
                                <span class="source-tag">Grade: ${eval_.grade}</span>
                                ${data.sources.scorecard.isMock ? '<span class="source-tag mock">Mock Data</span>' : ''}
                            </p>
                        </div>
                    </div>
                    
                    <div class="breakdown">
                        <div class="metric">
                            <div class="metric-label">Security</div>
                            <div class="metric-value ${getScoreClass(eval_.breakdown.security)}">
                                ${eval_.breakdown.security.toFixed(1)}
                            </div>
                            <small style="color: #64748b;">OpenSSF Scorecard</small>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Maintenance</div>
                            <div class="metric-value ${getScoreClass(eval_.breakdown.maintenance)}">
                                ${eval_.breakdown.maintenance.toFixed(1)}
                            </div>
                            <small style="color: #64748b;">Libraries.io</small>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Popularity</div>
                            <div class="metric-value ${getScoreClass(eval_.breakdown.popularity)}">
                                ${eval_.breakdown.popularity.toFixed(1)}
                            </div>
                            <small style="color: #64748b;">GitHub</small>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Ecosystem</div>
                            <div class="metric-value ${getScoreClass(eval_.breakdown.ecosystem)}">
                                ${eval_.breakdown.ecosystem.toFixed(1)}
                            </div>
                            <small style="color: #64748b;">Dependents</small>
                        </div>
                    </div>
                    
                    <div class="recommendation">
                        <strong>💡 Recommendation:</strong> ${eval_.recommendation}
                    </div>
                    
                    <div class="sources">
                        <h4 style="margin-bottom: 15px;">Data Sources</h4>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;">
                            <div class="metric">
                                <div class="metric-label">⭐ GitHub Stars</div>
                                <div class="metric-value">${data.sources.github.stars?.toLocaleString() || 'N/A'}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">🍴 Forks</div>
                                <div class="metric-value">${data.sources.github.forks?.toLocaleString() || 'N/A'}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">📦 Dependents</div>
                                <div class="metric-value">${data.sources.libraries.dependents?.toLocaleString() || 'N/A'}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">🏆 Rank</div>
                                <div class="metric-value">#${data.sources.libraries.rank || 'N/A'}</div>
                            </div>
                        </div>
                        
                        ${data.sources.scorecard.checks ? `
                        <h4 style="margin: 20px 0 10px;">🔒 Security Checks</h4>
                        <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                            ${data.sources.scorecard.checks.map(check => {
                                const icon = check.score >= 8 ? '✅' : check.score >= 5 ? '⚠️' : '❌';
                                return `<span class="source-tag">${icon} ${check.name}: ${check.score}/10</span>`;
                            }).join('')}
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }
        
        function getScoreClass(score) {
            if (score >= 8) return 'high';
            if (score >= 6) return 'medium';
            return 'low';
        }
        
        // Evaluate on Enter key
        document.getElementById('packageName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') evaluateTool();
        });
    </script>
</body>
</html>
